<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>เหมียว 3D — แมวเดินลื่น ๆ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #2a2440; }
  body { font-family: 'Sarabun', sans-serif; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  .ui {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 18px 20px calc(18px + env(safe-area-inset-bottom));
    display: flex; gap: 14px; align-items: center; justify-content: center;
    flex-wrap: wrap;
    background: linear-gradient(to top, rgba(20,16,34,.55), transparent);
    pointer-events: none;
    z-index: 5;
  }
  .panel {
    pointer-events: auto;
    display: flex; gap: 16px; align-items: center;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.22);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-radius: 18px; padding: 12px 18px;
    box-shadow: 0 8px 30px rgba(0,0,0,.25);
  }
  .ctl { display: flex; flex-direction: column; gap: 5px; min-width: 120px; }
  .ctl label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.8); letter-spacing: .02em; }
  input[type=range] {
    -webkit-appearance: none; appearance: none; height: 5px; border-radius: 5px;
    background: rgba(255,255,255,.3); outline: none; width: 130px; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 17px; height: 17px; border-radius: 50%;
    background: #ffd36e; box-shadow: 0 2px 6px rgba(0,0,0,.4); cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 17px; height: 17px; border-radius: 50%; border: none;
    background: #ffd36e; box-shadow: 0 2px 6px rgba(0,0,0,.4); cursor: pointer;
  }
  .btn {
    pointer-events: auto; cursor: pointer; user-select: none;
    font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 700;
    color: #2a2440; background: #ffd36e; border: none; border-radius: 13px;
    padding: 11px 16px; box-shadow: 0 6px 18px rgba(0,0,0,.28);
    transition: transform .12s, background .15s;
  }
  .btn:active { transform: scale(.95); }
  .btn.ghost { background: rgba(255,255,255,.16); color: #fff; border: 1px solid rgba(255,255,255,.25); }

  .title {
    position: fixed; top: 0; left: 0; right: 0; padding: 20px 22px;
    text-align: center; pointer-events: none; z-index: 5;
  }
  .title h1 {
    font-family: 'Sarabun', sans-serif; font-weight: 700; font-size: 22px; color: #fff;
    text-shadow: 0 2px 14px rgba(0,0,0,.4); letter-spacing: .01em;
  }
  .title p {
    font-size: 12.5px; color: rgba(255,255,255,.78); margin-top: 3px;
    text-shadow: 0 1px 8px rgba(0,0,0,.4);
  }
  .loader {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #2a2440; z-index: 10; transition: opacity .6s; color: #fff;
    font-size: 15px; flex-direction: column; gap: 14px;
  }
  .loader .paw { font-size: 40px; animation: bob 1s ease-in-out infinite; }
  @keyframes bob { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-12px) } }
  .hide { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="app"></div>

<div class="title">
  <h1>เหมียว 3D 🐈</h1>
  <p>ลากเพื่อหมุนกล้อง · เลื่อนเพื่อซูม · แตะตัวแมวให้มันร้องเหมียว</p>
</div>

<div class="ui">
  <div class="panel">
    <div class="ctl">
      <label>ความเร็วเดิน</label>
      <input id="speed" type="range" min="0" max="2.2" step="0.01" value="1" />
    </div>
    <button id="poseBtn" class="btn">นั่งพัก</button>
    <button id="rotBtn" class="btn ghost">หมุนกล้องเอง</button>
  </div>
</div>

<div class="loader" id="loader"><div class="paw">🐾</div><div>กำลังปั้นน้องแมว…</div></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ---------------------------------------------------------------- scene */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#2a2440');
scene.fog = new THREE.Fog('#2a2440', 9, 22);

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 100);
camera.position.set(4.2, 2.6, 5.6);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.target.set(0, 0.85, 0);
controls.minDistance = 3;
controls.maxDistance = 12;
controls.maxPolarAngle = Math.PI * 0.52;
controls.autoRotateSpeed = 1.1;

/* ---------------------------------------------------------------- lights */
scene.add(new THREE.HemisphereLight('#fff4e0', '#43406b', 0.85));

const key = new THREE.DirectionalLight('#fff1d8', 2.1);
key.position.set(5, 8, 6);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1; key.shadow.camera.far = 30;
key.shadow.camera.left = -7; key.shadow.camera.right = 7;
key.shadow.camera.top = 7; key.shadow.camera.bottom = -7;
key.shadow.bias = -0.0004;
key.shadow.radius = 5;
scene.add(key);

const rim = new THREE.DirectionalLight('#8ea0ff', 0.9);
rim.position.set(-6, 4, -5);
scene.add(rim);

/* ---------------------------------------------------------------- ground */
const groundGeo = new THREE.CircleGeometry(40, 64);
const groundMat = new THREE.MeshStandardMaterial({ color: '#6f6796', roughness: 1, metalness: 0 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// soft scrolling tiles on the ground to read as "walking forward"
const tileTex = makeTileTexture();
tileTex.wrapS = tileTex.wrapT = THREE.RepeatWrapping;
tileTex.repeat.set(14, 14);
const tileMat = new THREE.MeshStandardMaterial({ map: tileTex, transparent: true, opacity: 0.5, roughness: 1 });
const tiles = new THREE.Mesh(new THREE.CircleGeometry(40, 64), tileMat);
tiles.rotation.x = -Math.PI / 2;
tiles.position.y = 0.002;
tiles.receiveShadow = true;
scene.add(tiles);

// drifting bokeh dots in the background for motion / cuteness
const bokeh = new THREE.Group();
scene.add(bokeh);
const bokehColors = ['#ffd36e', '#ff8fb1', '#8ea0ff', '#7ee0c8'];
for (let i = 0; i < 26; i++) {
  const s = 0.12 + Math.random() * 0.32;
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(s, 12, 12),
    new THREE.MeshBasicMaterial({ color: bokehColors[i % 4], transparent: true, opacity: 0.5 })
  );
  m.position.set((Math.random() - 0.5) * 22, 0.6 + Math.random() * 5.5, -3 - Math.random() * 14);
  m.userData.sp = 0.4 + Math.random() * 0.8;
  bokeh.add(m);
}

/* ---------------------------------------------------------------- the cat */
// silver/grey mackerel tabby, chunky British-shorthair vibe to match the photo
const FUR = '#a89f92', FUR_DARK = '#6f685c', CREAM = '#e8e1d2', PINK = '#d98b94';
const furTex = makeTabbyTexture();

const furMat = new THREE.MeshStandardMaterial({ map: furTex, color: '#ffffff', roughness: 0.92, metalness: 0 });
const creamMat = new THREE.MeshStandardMaterial({ color: CREAM, roughness: 0.9 });
const darkMat = new THREE.MeshStandardMaterial({ color: FUR_DARK, roughness: 0.9 });
const pinkMat = new THREE.MeshStandardMaterial({ color: PINK, roughness: 0.6 });

const cat = new THREE.Group();
scene.add(cat);

const flexRoot = new THREE.Group();   // body bob / breathing
cat.add(flexRoot);

function ball(r, mat, sx = 1, sy = 1, sz = 1) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(r, 32, 24), mat);
  m.scale.set(sx, sy, sz); m.castShadow = true; m.receiveShadow = true;
  return m;
}

// --- body (chunky) ---
const body = ball(0.95, furMat, 1.0, 0.82, 1.25);
body.position.set(0, 0.95, 0);
flexRoot.add(body);

const chest = ball(0.7, furMat, 1.0, 0.95, 1.0);
chest.position.set(0, 0.85, 0.8);
flexRoot.add(chest);

const belly = ball(0.62, creamMat, 1.0, 0.7, 1.05);
belly.position.set(0, 0.6, 0.35);
flexRoot.add(belly);

// --- head group ---
const head = new THREE.Group();
head.position.set(0, 1.18, 1.25);
flexRoot.add(head);

const skull = ball(0.62, furMat, 1.05, 0.98, 0.95);
head.add(skull);

const cheekL = ball(0.3, furMat); cheekL.position.set(-0.38, -0.12, 0.18); head.add(cheekL);
const cheekR = ball(0.3, furMat); cheekR.position.set(0.38, -0.12, 0.18); head.add(cheekR);
const muzzle = ball(0.26, creamMat, 1.2, 0.85, 0.9); muzzle.position.set(0, -0.18, 0.5); head.add(muzzle);

// nose
const nose = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pinkMat);
nose.position.set(0, -0.1, 0.74); nose.scale.set(1.3, 0.9, 0.8); head.add(nose);

// ears
function ear(side) {
  const g = new THREE.Group();
  const outer = new THREE.Mesh(new THREE.ConeGeometry(0.26, 0.42, 24), furMat);
  outer.castShadow = true;
  const inner = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.3, 20), pinkMat);
  inner.position.set(0, -0.02, 0.05);
  g.add(outer, inner);
  g.position.set(0.34 * side, 0.52, 0.02);
  g.rotation.z = -0.32 * side;
  g.rotation.x = -0.18;
  return g;
}
const earL = ear(-1), earR = ear(1);
head.add(earL, earR);

// eyes (green, like the photos)
function eye(side) {
  const g = new THREE.Group();
  const white = new THREE.Mesh(new THREE.SphereGeometry(0.16, 24, 24),
    new THREE.MeshStandardMaterial({ color: '#9fb46a', roughness: 0.35 }));
  const iris = new THREE.Mesh(new THREE.SphereGeometry(0.108, 24, 24),
    new THREE.MeshStandardMaterial({ color: '#6f9540', roughness: 0.3, emissive: '#2c3d18', emissiveIntensity: 0.4 }));
  iris.position.z = 0.07;
  const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.055, 16, 16),
    new THREE.MeshStandardMaterial({ color: '#111', roughness: 0.2 }));
  pupil.position.z = 0.15; pupil.scale.set(0.7, 1, 1);
  const glint = new THREE.Mesh(new THREE.SphereGeometry(0.022, 10, 10),
    new THREE.MeshBasicMaterial({ color: '#fff' }));
  glint.position.set(0.04, 0.05, 0.18);
  g.add(white, iris, pupil, glint);
  g.position.set(0.26 * side, 0.06, 0.46);
  g.rotation.y = 0.25 * side;
  g.userData.lid = white; // for blink scaling
  return g;
}
const eyeL = eye(-1), eyeR = eye(1);
head.add(eyeL, eyeR);

// whiskers
const whiskerMat = new THREE.LineBasicMaterial({ color: '#efe9dd', transparent: true, opacity: 0.65 });
[-1, 1].forEach(side => {
  for (let i = 0; i < 3; i++) {
    const y = -0.12 + i * 0.07;
    const pts = [new THREE.Vector3(0.18 * side, y, 0.55), new THREE.Vector3(0.95 * side, y + (i - 1) * 0.05, 0.35)];
    head.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), whiskerMat));
  }
});

// --- legs ---
const legs = [];
function makeLeg(x, z, front) {
  const hip = new THREE.Group();
  hip.position.set(x, 0.62, z);
  flexRoot.add(hip);

  const thigh = ball(0.26, furMat, 1, 1.4, 1);
  thigh.position.y = -0.18;
  hip.add(thigh);

  const shin = new THREE.Group();
  shin.position.y = -0.42;
  hip.add(shin);
  const lower = ball(0.18, furMat, 1, 1.3, 1);
  lower.position.y = -0.16;
  shin.add(lower);
  const paw = ball(0.2, creamMat, 1.1, 0.7, 1.25);
  paw.position.set(0, -0.34, 0.06);
  shin.add(paw);

  hip.userData = { shin, front, baseZ: z };
  legs.push(hip);
  return hip;
}
makeLeg(-0.45, 0.75, true);
makeLeg(0.45, 0.75, true);
makeLeg(-0.5, -0.7, false);
makeLeg(0.5, -0.7, false);

// --- tail (segmented, swishy) ---
const tailSegs = [];
let tailParent = flexRoot;
const tailBase = new THREE.Group();
tailBase.position.set(0, 1.0, -1.15);
flexRoot.add(tailBase);
tailParent = tailBase;
for (let i = 0; i < 8; i++) {
  const seg = new THREE.Group();
  seg.position.z = -0.26;
  const r = 0.2 - i * 0.016;
  const mesh = ball(r, i % 2 === 0 ? furMat : darkMat, 1, 1, 1.2); // faint rings
  seg.add(mesh);
  tailParent.add(seg);
  tailSegs.push(seg);
  tailParent = seg;
}

// --- collar + bell (like the photo) ---
const collar = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.06, 16, 40),
  new THREE.MeshStandardMaterial({ color: '#33312e', roughness: 0.6 }));
collar.rotation.x = Math.PI / 2;
collar.position.set(0, 0.78, 1.02);
collar.scale.set(1, 1, 0.8);
flexRoot.add(collar);
const bell = new THREE.Mesh(new THREE.SphereGeometry(0.1, 20, 20),
  new THREE.MeshStandardMaterial({ color: '#f2c14e', roughness: 0.3, metalness: 0.7 }));
bell.position.set(0, 0.55, 1.4);
flexRoot.add(bell);

// contact shadow helper already via shadowMap; add a soft blob too
const blob = new THREE.Mesh(new THREE.CircleGeometry(1.25, 32),
  new THREE.MeshBasicMaterial({ color: '#000', transparent: true, opacity: 0.22 }));
blob.rotation.x = -Math.PI / 2; blob.position.y = 0.01;
cat.add(blob);

/* ---------------------------------------------------------------- speech bubble */
const meowSprite = makeMeow();
meowSprite.position.set(0.9, 2.4, 1);
meowSprite.scale.set(0, 0, 0);
cat.add(meowSprite);
let meowT = 0;

/* ---------------------------------------------------------------- interaction */
const ray = new THREE.Raycaster();
const pointer = new THREE.Vector2();
renderer.domElement.addEventListener('pointerdown', (e) => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  ray.setFromCamera(pointer, camera);
  if (ray.intersectObject(cat, true).length) meow();
});
function meow() { meowT = 1.6; }

/* ---------------------------------------------------------------- ui */
let walkSpeed = 1, walking = true, blinkT = 0, nextBlink = 2;
const speedEl = document.getElementById('speed');
speedEl.addEventListener('input', () => { walkSpeed = +speedEl.value; });
const poseBtn = document.getElementById('poseBtn');
poseBtn.addEventListener('click', () => {
  walking = !walking;
  poseBtn.textContent = walking ? 'นั่งพัก' : 'เดินต่อ';
});
const rotBtn = document.getElementById('rotBtn');
rotBtn.addEventListener('click', () => {
  controls.autoRotate = !controls.autoRotate;
  rotBtn.style.background = controls.autoRotate ? '#ffd36e' : 'rgba(255,255,255,.16)';
  rotBtn.style.color = controls.autoRotate ? '#2a2440' : '#fff';
});

/* ---------------------------------------------------------------- animate */
const clock = new THREE.Clock();
let t = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const gait = walking ? walkSpeed : 0;
  t += dt * (3.2 * gait + (walking ? 0 : 0.0));

  // breathing always
  const breathe = Math.sin(performance.now() * 0.0016) * 0.02;

  // body bob (2x leg freq) while walking
  const bob = Math.sin(t * 2) * 0.06 * gait;
  flexRoot.position.y = bob;
  flexRoot.rotation.z = Math.sin(t) * 0.04 * gait;
  flexRoot.scale.y = 1 + breathe;

  // legs — diagonal gait
  legs.forEach((hip) => {
    const phase = hip.userData.front ? (hip.position.x < 0 ? 0 : Math.PI)
                                     : (hip.position.x < 0 ? Math.PI : 0);
    const swing = Math.sin(t + phase) * 0.5 * gait;
    hip.rotation.x = swing;
    // knee bends on the lift
    hip.userData.shin.rotation.x = Math.max(0, Math.cos(t + phase)) * 0.6 * gait;
  });

  // tail travelling wave
  tailSegs.forEach((seg, i) => {
    seg.rotation.y = Math.sin(t * 1.4 - i * 0.55) * (0.16 + i * 0.015) + Math.sin(t * 0.5) * 0.05;
    seg.rotation.x = Math.cos(t * 1.2 - i * 0.5) * 0.05 - 0.04;
  });

  // head gentle bob + look toward camera a touch
  head.rotation.x = Math.sin(t * 2) * 0.04 * gait - 0.02;
  head.rotation.z = Math.sin(t) * 0.03 * gait;
  earL.rotation.x = -0.18 + Math.sin(t * 3 + 1) * 0.06 * gait;
  earR.rotation.x = -0.18 + Math.sin(t * 3) * 0.06 * gait;

  // blink
  blinkT += dt;
  let lid = 1;
  if (blinkT > nextBlink) { const k = (blinkT - nextBlink) / 0.14; lid = Math.abs(Math.cos(k * Math.PI)); if (blinkT > nextBlink + 0.14) { blinkT = 0; nextBlink = 1.8 + Math.random() * 3; } }
  eyeL.scale.y = eyeR.scale.y = 0.15 + 0.85 * lid;

  // treadmill ground + bokeh drift => "walking forward"
  tileTex.offset.y -= dt * 0.16 * gait;
  bokeh.children.forEach((m) => {
    m.position.z += dt * m.userData.sp * (0.6 + gait);
    m.position.y += Math.sin(performance.now() * 0.001 + m.position.x) * dt * 0.15;
    if (m.position.z > 6) { m.position.z = -18; m.position.x = (Math.random() - 0.5) * 22; }
  });

  // meow bubble pop
  if (meowT > 0) {
    meowT -= dt;
    const s = Math.min(1, (1.6 - meowT) * 6) * Math.min(1, meowT * 3);
    meowSprite.scale.setScalar(s * 1.1);
    meowSprite.position.y = 2.4 + (1 - Math.min(1, meowT * 2)) * 0.2;
  } else meowSprite.scale.setScalar(0);

  // idle whole-cat sway when not walking
  cat.rotation.y = Math.sin(performance.now() * 0.0004) * (walking ? 0.05 : 0.12);

  controls.update();
  renderer.render(scene, camera);
}
animate();

// reveal
setTimeout(() => document.getElementById('loader').classList.add('hide'), 500);

/* ---------------------------------------------------------------- resize */
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ---------------------------------------------------------------- textures */
function makeTabbyTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const x = c.getContext('2d');
  const g = x.createLinearGradient(0, 0, 0, 512);
  g.addColorStop(0, '#b4ab9d'); g.addColorStop(0.6, '#a89f92'); g.addColorStop(1, '#cfc7b8');
  x.fillStyle = g; x.fillRect(0, 0, 512, 512);
  // subtle grain
  for (let i = 0; i < 4000; i++) {
    x.fillStyle = `rgba(${Math.random()>.5?120:200},${110},${100},0.05)`;
    x.fillRect(Math.random()*512, Math.random()*512, 2, 2);
  }
  // mackerel stripes — wavy vertical bands
  x.lineCap = 'round';
  for (let s = -2; s < 12; s++) {
    x.beginPath();
    x.strokeStyle = `rgba(95,88,78,${0.35 + Math.random()*0.2})`;
    x.lineWidth = 9 + Math.random()*9;
    const baseX = s * 46 + 20;
    for (let yy = 0; yy <= 512; yy += 16) {
      const xx = baseX + Math.sin(yy * 0.018 + s) * 16;
      yy === 0 ? x.moveTo(xx, yy) : x.lineTo(xx, yy);
    }
    x.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

function makeTileTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const x = c.getContext('2d');
  x.clearRect(0, 0, 128, 128);
  x.strokeStyle = 'rgba(255,255,255,0.5)'; x.lineWidth = 3;
  x.strokeRect(2, 2, 124, 124);
  const tex = new THREE.CanvasTexture(c);
  return tex;
}

function makeMeow() {
  const c = document.createElement('canvas'); c.width = 256; c.height = 160;
  const x = c.getContext('2d');
  // bubble
  x.fillStyle = '#fff';
  roundRect(x, 16, 14, 224, 96, 26); x.fill();
  x.beginPath(); x.moveTo(60, 104); x.lineTo(44, 150); x.lineTo(96, 104); x.closePath(); x.fill();
  x.fillStyle = '#2a2440';
  x.font = 'bold 56px Sarabun, sans-serif'; x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillText('เหมียว~', 128, 60);
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  sp.scale.set(1.6, 1.0, 1);
  return sp;
}
function roundRect(x, X, Y, w, h, r) {
  x.beginPath();
  x.moveTo(X + r, Y); x.arcTo(X + w, Y, X + w, Y + h, r);
  x.arcTo(X + w, Y + h, X, Y + h, r); x.arcTo(X, Y + h, X, Y, r);
  x.arcTo(X, Y, X + w, Y, r); x.closePath();
}
</script>
</body>
</html>
