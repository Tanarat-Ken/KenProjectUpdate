<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>เหมียว 3D — แมวโต้ตอบได้</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #2a2440; }
  body { font-family: 'Sarabun', sans-serif; }
  body.embed { background: transparent; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  .ui {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    display: flex; gap: 10px; align-items: center; justify-content: center;
    flex-wrap: wrap;
    background: linear-gradient(to top, rgba(20,16,34,.55), transparent);
    pointer-events: none; z-index: 5;
  }
  .panel {
    pointer-events: auto;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.22);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-radius: 18px; padding: 11px 13px;
    box-shadow: 0 8px 30px rgba(0,0,0,.25); max-width: 760px;
  }
  .btn {
    pointer-events: auto; cursor: pointer; user-select: none;
    font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 700;
    color: #2a2440; background: rgba(255,255,255,.82); border: 2px solid transparent; border-radius: 13px;
    padding: 9px 13px; box-shadow: 0 4px 12px rgba(0,0,0,.22);
    transition: transform .1s, background .15s, border-color .15s; white-space: nowrap;
  }
  .btn:active { transform: scale(.9); }
  .btn.active { background: #ffd36e; border-color: #fff; }
  .ctl { display: flex; flex-direction: column; gap: 4px; padding: 0 4px; }
  .ctl label { font-size: 10.5px; font-weight: 600; color: rgba(255,255,255,.85); }
  input[type=range] {
    -webkit-appearance: none; appearance: none; height: 5px; border-radius: 5px;
    background: rgba(255,255,255,.3); outline: none; width: 96px; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #ffd36e; box-shadow: 0 2px 6px rgba(0,0,0,.4); }
  input[type=range]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; border: none; background: #ffd36e; }

  .title { position: fixed; top: 0; left: 0; right: 0; padding: 18px 22px; text-align: center; pointer-events: none; z-index: 5; }
  .title h1 { font-weight: 700; font-size: 21px; color: #fff; text-shadow: 0 2px 14px rgba(0,0,0,.4); }
  .title p { font-size: 12px; color: rgba(255,255,255,.78); margin-top: 3px; text-shadow: 0 1px 8px rgba(0,0,0,.4); }

  .loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #2a2440; z-index: 10; transition: opacity .6s; color: #fff; flex-direction: column; gap: 14px; }
  body.embed .loader { background: transparent; }
  .loader .paw { font-size: 40px; animation: bob 1s ease-in-out infinite; }
  @keyframes bob { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-12px) } }
  .hide { opacity: 0; pointer-events: none; }
  body.embed .title, body.embed .ui { display: none; }
</style>
</head>
<body>
<div id="app"></div>

<div class="title">
  <h1>เหมียว 3D 🐈</h1>
  <p>กดปุ่มสั่งน้องได้ทุกปุ่ม · ลากหมุนกล้อง · แตะตัวน้องให้ร้องเหมียว</p>
</div>

<div class="ui">
  <div class="panel" id="panel">
    <button class="btn" data-act="walk">เดิน</button>
    <button class="btn" data-act="sit">นั่ง</button>
    <button class="btn" data-act="sleep">นอน</button>
    <button class="btn" data-act="jump">กระโดด</button>
    <button class="btn" data-act="meow">เหมียว</button>
    <button class="btn" data-act="happy">ดีใจ</button>
    <button class="btn" data-act="groom">เลียขน</button>
    <button class="btn" data-act="spin">หมุนตัว</button>
    <button class="btn" data-act="camera">หมุนกล้อง</button>
    <div class="ctl"><label>ความเร็วเดิน</label><input id="speed" type="range" min="0.2" max="2.4" step="0.01" value="1" /></div>
  </div>
</div>

<div class="loader" id="loader"><div class="paw">🐾</div><div>กำลังปั้นน้องแมว…</div></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const EMBED = new URLSearchParams(location.search).has('embed');
if (EMBED) document.body.classList.add('embed');

/* ---------------------------------------------------------------- renderer */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
if (EMBED) renderer.setClearColor(0x000000, 0);
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
if (!EMBED) { scene.background = new THREE.Color('#2a2440'); scene.fog = new THREE.Fog('#2a2440', 9, 22); }

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 100);
camera.position.set(4.2, 2.6, 5.6);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.06;
controls.target.set(0, 0.85, 0);
controls.minDistance = 3; controls.maxDistance = 12;
controls.maxPolarAngle = Math.PI * 0.52;
controls.autoRotateSpeed = 1.1;
controls.enablePan = false;
if (EMBED) { controls.enableZoom = false; camera.position.set(3.2, 2.2, 4.6); }

/* ---------------------------------------------------------------- lights */
scene.add(new THREE.HemisphereLight('#fff4e0', '#43406b', 0.85));
const key = new THREE.DirectionalLight('#fff1d8', 2.1);
key.position.set(5, 8, 6); key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1; key.shadow.camera.far = 30;
key.shadow.camera.left = -7; key.shadow.camera.right = 7; key.shadow.camera.top = 7; key.shadow.camera.bottom = -7;
key.shadow.bias = -0.0004; key.shadow.radius = 5;
scene.add(key);
const rim = new THREE.DirectionalLight('#8ea0ff', 0.9); rim.position.set(-6, 4, -5); scene.add(rim);

/* ---------------------------------------------------------------- ground */
let tileTex, bokeh;
if (!EMBED) {
  const ground = new THREE.Mesh(new THREE.CircleGeometry(40, 64),
    new THREE.MeshStandardMaterial({ color: '#6f6796', roughness: 1 }));
  ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

  tileTex = makeTileTexture();
  tileTex.wrapS = tileTex.wrapT = THREE.RepeatWrapping; tileTex.repeat.set(14, 14);
  const tiles = new THREE.Mesh(new THREE.CircleGeometry(40, 64),
    new THREE.MeshStandardMaterial({ map: tileTex, transparent: true, opacity: 0.5, roughness: 1 }));
  tiles.rotation.x = -Math.PI / 2; tiles.position.y = 0.002; tiles.receiveShadow = true; scene.add(tiles);

  bokeh = new THREE.Group(); scene.add(bokeh);
  const cols = ['#ffd36e', '#ff8fb1', '#8ea0ff', '#7ee0c8'];
  for (let i = 0; i < 26; i++) {
    const s = 0.12 + Math.random() * 0.32;
    const m = new THREE.Mesh(new THREE.SphereGeometry(s, 12, 12),
      new THREE.MeshBasicMaterial({ color: cols[i % 4], transparent: true, opacity: 0.5 }));
    m.position.set((Math.random() - 0.5) * 22, 0.6 + Math.random() * 5.5, -3 - Math.random() * 14);
    m.userData.sp = 0.4 + Math.random() * 0.8; bokeh.add(m);
  }
} else {
  // invisible shadow-catcher so the cat keeps a soft shadow when embedded
  const sc = new THREE.Mesh(new THREE.CircleGeometry(40, 48), new THREE.ShadowMaterial({ opacity: 0.25 }));
  sc.rotation.x = -Math.PI / 2; sc.receiveShadow = true; scene.add(sc);
}

/* ---------------------------------------------------------------- materials */
const FUR_DARK = '#6f685c', CREAM = '#e8e1d2', PINK = '#d98b94';
const furTex = makeTabbyTexture();
const furMat = new THREE.MeshStandardMaterial({ map: furTex, roughness: 0.92 });
const creamMat = new THREE.MeshStandardMaterial({ color: CREAM, roughness: 0.9 });
const darkMat = new THREE.MeshStandardMaterial({ color: FUR_DARK, roughness: 0.9 });
const pinkMat = new THREE.MeshStandardMaterial({ color: PINK, roughness: 0.6 });
const mouthMat = new THREE.MeshStandardMaterial({ color: '#7a3b42', roughness: 0.5 });

function ball(r, mat, sx = 1, sy = 1, sz = 1) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(r, 32, 24), mat);
  m.scale.set(sx, sy, sz); m.castShadow = true; m.receiveShadow = true; return m;
}

/* ---------------------------------------------------------------- cat rig */
const cat = new THREE.Group(); scene.add(cat);
const flexRoot = new THREE.Group(); cat.add(flexRoot);

const body = ball(0.95, furMat, 1.0, 0.82, 1.25); body.position.set(0, 0.95, 0); flexRoot.add(body);
const chest = ball(0.7, furMat); chest.position.set(0, 0.85, 0.8); flexRoot.add(chest);
const belly = ball(0.62, creamMat, 1.0, 0.7, 1.05); belly.position.set(0, 0.6, 0.35); flexRoot.add(belly);

const head = new THREE.Group(); head.position.set(0, 1.18, 1.25); flexRoot.add(head);
head.add(ball(0.62, furMat, 1.05, 0.98, 0.95));
const cheekL = ball(0.3, furMat); cheekL.position.set(-0.38, -0.12, 0.18); head.add(cheekL);
const cheekR = ball(0.3, furMat); cheekR.position.set(0.38, -0.12, 0.18); head.add(cheekR);
const muzzle = ball(0.26, creamMat, 1.2, 0.85, 0.9); muzzle.position.set(0, -0.18, 0.5); head.add(muzzle);
const nose = ball(0.07, pinkMat, 1.3, 0.9, 0.8); nose.position.set(0, -0.1, 0.74); head.add(nose);

// mouth + tongue (for meow / groom)
const mouth = new THREE.Mesh(new THREE.SphereGeometry(0.12, 20, 16), mouthMat);
mouth.position.set(0, -0.28, 0.56); mouth.scale.set(1, 0.05, 0.6); head.add(mouth);
const tongue = ball(0.08, pinkMat, 1, 0.5, 1.2); tongue.position.set(0, -0.3, 0.66); tongue.scale.setScalar(0); head.add(tongue);

function ear(side) {
  const g = new THREE.Group();
  const outer = new THREE.Mesh(new THREE.ConeGeometry(0.26, 0.42, 24), furMat); outer.castShadow = true;
  const inner = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.3, 20), pinkMat); inner.position.set(0, -0.02, 0.05);
  g.add(outer, inner);
  g.position.set(0.34 * side, 0.52, 0.02); g.rotation.z = -0.32 * side; g.rotation.x = -0.18;
  g.userData.baseZ = -0.32 * side; return g;
}
const earL = ear(-1), earR = ear(1); head.add(earL, earR);

function eye(side) {
  const g = new THREE.Group();
  const w = new THREE.Mesh(new THREE.SphereGeometry(0.16, 24, 24), new THREE.MeshStandardMaterial({ color: '#9fb46a', roughness: 0.35 }));
  const iris = new THREE.Mesh(new THREE.SphereGeometry(0.108, 24, 24), new THREE.MeshStandardMaterial({ color: '#6f9540', roughness: 0.3, emissive: '#2c3d18', emissiveIntensity: 0.4 })); iris.position.z = 0.07;
  const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.055, 16, 16), new THREE.MeshStandardMaterial({ color: '#111' })); pupil.position.z = 0.15; pupil.scale.set(0.7, 1, 1);
  const glint = new THREE.Mesh(new THREE.SphereGeometry(0.022, 10, 10), new THREE.MeshBasicMaterial({ color: '#fff' })); glint.position.set(0.04, 0.05, 0.18);
  g.add(w, iris, pupil, glint);
  g.position.set(0.26 * side, 0.06, 0.46); g.rotation.y = 0.25 * side; g.userData.pupil = pupil; return g;
}
const eyeL = eye(-1), eyeR = eye(1); head.add(eyeL, eyeR);

const wMat = new THREE.LineBasicMaterial({ color: '#efe9dd', transparent: true, opacity: 0.65 });
[-1, 1].forEach(side => { for (let i = 0; i < 3; i++) { const y = -0.12 + i * 0.07;
  head.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(0.18 * side, y, 0.55), new THREE.Vector3(0.95 * side, y + (i - 1) * 0.05, 0.35)]), wMat)); } });

// legs
const legs = [];
function makeLeg(x, z, front) {
  const hip = new THREE.Group(); hip.position.set(x, 0.62, z); flexRoot.add(hip);
  const thigh = ball(0.26, furMat, 1, 1.4, 1); thigh.position.y = -0.18; hip.add(thigh);
  const shin = new THREE.Group(); shin.position.y = -0.42; hip.add(shin);
  const lower = ball(0.18, furMat, 1, 1.3, 1); lower.position.set(0, -0.16, 0); shin.add(lower);
  const paw = ball(0.2, creamMat, 1.1, 0.7, 1.25); paw.position.set(0, -0.34, 0.06); shin.add(paw);
  hip.userData = { shin, front, side: Math.sign(x), paw }; legs.push(hip); return hip;
}
makeLeg(-0.45, 0.75, true); makeLeg(0.45, 0.75, true);
makeLeg(-0.5, -0.7, false); makeLeg(0.5, -0.7, false);

// tail
const tailSegs = []; const tailBase = new THREE.Group(); tailBase.position.set(0, 1.0, -1.15); flexRoot.add(tailBase);
let tp = tailBase;
for (let i = 0; i < 8; i++) { const seg = new THREE.Group(); seg.position.z = -0.26;
  seg.add(ball(0.2 - i * 0.016, i % 2 === 0 ? furMat : darkMat, 1, 1, 1.2)); tp.add(seg); tailSegs.push(seg); tp = seg; }

// collar + bell
const collar = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.06, 16, 40), new THREE.MeshStandardMaterial({ color: '#33312e', roughness: 0.6 }));
collar.rotation.x = Math.PI / 2; collar.position.set(0, 0.78, 1.02); collar.scale.set(1, 1, 0.8); flexRoot.add(collar);
const bell = new THREE.Mesh(new THREE.SphereGeometry(0.1, 20, 20), new THREE.MeshStandardMaterial({ color: '#f2c14e', roughness: 0.3, metalness: 0.7 }));
bell.position.set(0, 0.55, 1.4); flexRoot.add(bell);

const blob = new THREE.Mesh(new THREE.CircleGeometry(1.25, 32), new THREE.MeshBasicMaterial({ color: '#000', transparent: true, opacity: EMBED ? 0 : 0.22 }));
blob.rotation.x = -Math.PI / 2; blob.position.y = 0.01; cat.add(blob);

const meowSprite = makeMeow(); meowSprite.position.set(0.9, 2.4, 1); meowSprite.scale.setScalar(0); cat.add(meowSprite);

// little hearts for "happy"
const hearts = [];
for (let i = 0; i < 5; i++) { const h = makeHeart(); h.scale.setScalar(0); cat.add(h); hearts.push(h); }

/* ---------------------------------------------------------------- poses */
const POSES = {
  stand: { walk: 0, pitch: 0, height: 0, crouch: 0, front: 0, back: 0, headP: -0.02, ear: 0, eye: 1, tail: 0 },
  walk:  { walk: 1, pitch: 0, height: 0, crouch: 0, front: 0, back: 0, headP: -0.02, ear: 0, eye: 1, tail: 0 },
  sit:   { walk: 0, pitch: -0.16, height: -0.06, crouch: 0.04, front: 0, back: 1.25, headP: 0.06, ear: 0, eye: 1, tail: -0.55 },
  sleep: { walk: 0, pitch: 0, height: -0.5, crouch: 0.55, front: 1.0, back: 1.45, headP: 0.28, ear: 0.65, eye: 0.06, tail: 0.25 },
};
let state = 'walk';
const cur = { ...POSES.walk };       // smoothly-lerped current pose
const lerp = (a, b, t) => a + (b - a) * t;

/* ---------------------------------------------------------------- one-shots */
let meowT = 0, jumpT = 0, happyT = 0, groomT = 0, spinT = 0, startleT = 0, spinFrom = 0;

function setPose(s) { if (POSES[s]) { state = s; updateActiveBtn(); } }
function meow() { meowT = 1.6; }
function jump() { if (jumpT <= 0) jumpT = 0.7; }
function happy() { happyT = 1.8; for (const h of hearts) { h.userData.t = Math.random() * 0.4; h.userData.x = (Math.random() - 0.5) * 1.2; } }
function groom() { groomT = 2.2; }
function spin() { if (spinT <= 0) { spinT = 1.0; spinFrom = cat.rotation.y; } }
function startle() { startleT = 1.2; }

const ACTIONS = {
  walk: () => setPose(state === 'walk' ? 'stand' : 'walk'),
  sit: () => setPose('sit'),
  sleep: () => setPose('sleep'),
  stand: () => setPose('stand'),
  jump: () => { if (state === 'sleep' || state === 'sit') setPose('stand'); jump(); },
  meow: () => meow(),
  happy: () => { if (state === 'sleep') setPose('stand'); happy(); },
  groom: () => groom(),
  spin: () => spin(),
  startle: () => startle(),
  camera: () => toggleCamera(),
};
function doAction(a) { if (ACTIONS[a]) ACTIONS[a](); }

// allow the host web page to drive the cat: postMessage({type:'cat', action:'happy'})
addEventListener('message', (e) => { const d = e.data; if (d && d.type === 'cat' && typeof d.action === 'string') doAction(d.action); });
// tell the host we're ready
try { parent && parent !== window && parent.postMessage({ type: 'cat-ready' }, '*'); } catch (_) {}

/* ---------------------------------------------------------------- input */
const ray = new THREE.Raycaster(); const ptr = new THREE.Vector2();
let look = { x: 0, y: 0 };
renderer.domElement.addEventListener('pointerdown', (e) => {
  ptr.x = (e.clientX / innerWidth) * 2 - 1; ptr.y = -(e.clientY / innerHeight) * 2 + 1;
  ray.setFromCamera(ptr, camera);
  if (ray.intersectObject(cat, true).length) { meow(); }
});
addEventListener('pointermove', (e) => { look.x = (e.clientX / innerWidth) * 2 - 1; look.y = -(e.clientY / innerHeight) * 2 + 1; });

// buttons
let walkSpeed = 1;
const panel = document.getElementById('panel');
panel?.addEventListener('click', (e) => {
  const b = e.target.closest('[data-act]'); if (!b) return;
  doAction(b.dataset.act);
});
function updateActiveBtn() {
  panel?.querySelectorAll('[data-act]').forEach(b => {
    const on = (b.dataset.act === 'walk' && state === 'walk') || b.dataset.act === state;
    b.classList.toggle('active', !!on);
  });
}
updateActiveBtn();
const speedEl = document.getElementById('speed');
speedEl?.addEventListener('input', () => walkSpeed = +speedEl.value);
function toggleCamera() {
  controls.autoRotate = !controls.autoRotate;
  panel?.querySelector('[data-act="camera"]')?.classList.toggle('active', controls.autoRotate);
}

/* ---------------------------------------------------------------- loop */
const clock = new THREE.Clock(); let t = 0;
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // blend toward target pose
  const target = POSES[state];
  for (const k in cur) cur[k] = lerp(cur[k], target[k], 1 - Math.pow(0.001, dt));

  const gait = cur.walk * walkSpeed;
  t += dt * (3.2 * gait + 0.0001);
  const now = performance.now();

  // one-shot timers
  if (meowT > 0) meowT -= dt;
  if (jumpT > 0) jumpT -= dt;
  if (happyT > 0) happyT -= dt;
  if (groomT > 0) groomT -= dt;
  if (spinT > 0) spinT -= dt;
  if (startleT > 0) startleT -= dt;

  // jump arc + squash/stretch
  let jumpY = 0, stretch = 0;
  if (jumpT > 0) { const p = 1 - jumpT / 0.7; jumpY = Math.sin(p * Math.PI) * 1.15; stretch = Math.sin(p * Math.PI - 0.5) * 0.18; }

  // happy bounce
  const happyBounce = happyT > 0 ? Math.abs(Math.sin(now * 0.02)) * 0.18 : 0;

  // base body transform from pose
  const breathe = Math.sin(now * 0.0016) * 0.02;
  const purr = state === 'sleep' || groomT > 0 ? Math.sin(now * 0.08) * 0.006 : 0;
  flexRoot.position.y = cur.height + Math.sin(t * 2) * 0.06 * gait + jumpY + happyBounce + purr;
  flexRoot.rotation.x = cur.pitch;
  flexRoot.rotation.z = Math.sin(t) * 0.04 * gait + (happyT > 0 ? Math.sin(now * 0.018) * 0.12 : 0);
  flexRoot.scale.y = (1 - cur.crouch) * (1 + breathe) + stretch;
  flexRoot.scale.x = flexRoot.scale.z = 1 - stretch * 0.5;

  // legs: pose tuck + walk swing
  legs.forEach((hip) => {
    const phase = hip.userData.front ? (hip.userData.side < 0 ? 0 : Math.PI) : (hip.userData.side < 0 ? Math.PI : 0);
    const swing = Math.sin(t + phase) * 0.5 * gait;
    const tuck = hip.userData.front ? cur.front : cur.back;
    hip.rotation.x = tuck + swing;
    hip.userData.shin.rotation.x = tuck * 0.7 + Math.max(0, Math.cos(t + phase)) * 0.6 * gait;
  });

  // tail — mood driven
  const tailMood = happyT > 0 ? -0.6 : 0;            // raises tail up when happy
  tailBase.rotation.x = cur.tail + tailMood;
  const swishAmp = happyT > 0 ? 0.4 : (state === 'sleep' ? 0.04 : 0.16);
  tailSegs.forEach((seg, i) => {
    seg.rotation.y = Math.sin(t * 1.4 - i * 0.55 + now * (happyT > 0 ? 0.004 : 0)) * (swishAmp + i * 0.015) + Math.sin(t * 0.5) * 0.05;
    seg.rotation.x = Math.cos(t * 1.2 - i * 0.5) * 0.05 - 0.04;
  });

  // head: pose + bob + look toward cursor (not when sleeping)
  const lookA = state === 'sleep' ? 0 : 1;
  head.rotation.x = cur.headP + Math.sin(t * 2) * 0.04 * gait + look.y * 0.18 * lookA + (groomT > 0 ? 0.3 : 0);
  head.rotation.y = look.x * 0.28 * lookA + (groomT > 0 ? 0.15 : 0);
  head.rotation.z = Math.sin(t) * 0.03 * gait;

  // ears: flatten on sleep/startle, perk on happy, twitch on walk
  const earFlat = cur.ear + (startleT > 0 ? 0.8 : 0);
  const earPerk = happyT > 0 ? -0.15 : 0;
  earL.rotation.x = -0.18 - earFlat * 0.5 + earPerk + Math.sin(t * 3 + 1) * 0.06 * gait;
  earR.rotation.x = -0.18 - earFlat * 0.5 + earPerk + Math.sin(t * 3) * 0.06 * gait;

  // eyes: pose openness * blink, wide on startle
  blinkUpdate(dt);
  let open = cur.eye * blinkLid;
  if (startleT > 0) open = Math.min(1.3, open + 0.4);
  eyeL.scale.y = eyeR.scale.y = 0.12 + 0.9 * Math.min(1.3, open);
  // pupils dilate on startle/happy
  const pd = 1 + (startleT > 0 ? 0.5 : 0) + (happyT > 0 ? 0.2 : 0);
  eyeL.userData.pupil.scale.set(0.7 * pd, pd, 1); eyeR.userData.pupil.scale.set(0.7 * pd, pd, 1);

  // mouth + tongue for meow / groom
  const mouthOpen = meowT > 0 ? Math.sin(Math.min(1, (1.6 - meowT) * 4) * Math.PI) : 0;
  mouth.scale.y = 0.05 + mouthOpen * 0.9;
  const tongueOut = groomT > 0 ? Math.abs(Math.sin(now * 0.012)) : (meowT > 0 ? mouthOpen * 0.5 : 0);
  tongue.scale.setScalar(tongueOut * 0.9);
  tongue.position.y = -0.3 - tongueOut * 0.04;

  // meow bubble
  if (meowT > 0) { const s = Math.min(1, (1.6 - meowT) * 6) * Math.min(1, meowT * 3); meowSprite.scale.setScalar(s * 1.1); meowSprite.position.y = 2.4 + (1 - Math.min(1, meowT * 2)) * 0.2; }
  else meowSprite.scale.setScalar(0);

  // hearts float up when happy
  hearts.forEach((h, i) => {
    if (happyT > 0) {
      h.userData.t = (h.userData.t || 0) + dt;
      const p = h.userData.t % 1.2;
      h.position.set((h.userData.x || 0) + Math.sin(p * 6 + i) * 0.1, 1.8 + p * 1.4, 0.6);
      h.scale.setScalar(Math.sin(Math.min(1, p * 2) * Math.PI) * 0.5);
      h.material.opacity = 1 - p / 1.2;
    } else h.scale.setScalar(0);
  });

  // spin (playful 360 of the whole cat)
  if (spinT > 0) { const p = 1 - spinT / 1.0; cat.rotation.y = spinFrom + easeInOut(p) * Math.PI * 2; }
  else cat.rotation.y = Math.sin(now * 0.0004) * (gait > 0.05 ? 0.05 : 0.12);

  // startle little crouch-recover
  if (startleT > 0) { const p = 1 - startleT / 1.2; flexRoot.position.y -= Math.sin(Math.min(1, p * 5) * Math.PI) * 0.15; }

  // world motion (only full-screen mode)
  if (!EMBED) {
    tileTex.offset.y -= dt * 0.16 * gait;
    bokeh.children.forEach((m) => {
      m.position.z += dt * m.userData.sp * (0.6 + gait);
      if (m.position.z > 6) { m.position.z = -18; m.position.x = (Math.random() - 0.5) * 22; }
    });
  }

  controls.update();
  renderer.render(scene, camera);
}

let blinkT = 0, nextBlink = 2, blinkLid = 1;
function blinkUpdate(dt) {
  blinkT += dt; blinkLid = 1;
  if (blinkT > nextBlink) {
    const k = (blinkT - nextBlink) / 0.14; blinkLid = Math.abs(Math.cos(k * Math.PI));
    if (blinkT > nextBlink + 0.14) { blinkT = 0; nextBlink = 1.8 + Math.random() * 3; }
  }
}
const easeInOut = (p) => p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;

animate();
setTimeout(() => document.getElementById('loader').classList.add('hide'), 500);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ---------------------------------------------------------------- textures */
function makeTabbyTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 512; const x = c.getContext('2d');
  const g = x.createLinearGradient(0, 0, 0, 512);
  g.addColorStop(0, '#b4ab9d'); g.addColorStop(0.6, '#a89f92'); g.addColorStop(1, '#cfc7b8');
  x.fillStyle = g; x.fillRect(0, 0, 512, 512);
  for (let i = 0; i < 4000; i++) { x.fillStyle = `rgba(${Math.random() > .5 ? 120 : 200},110,100,0.05)`; x.fillRect(Math.random() * 512, Math.random() * 512, 2, 2); }
  x.lineCap = 'round';
  for (let s = -2; s < 12; s++) { x.beginPath(); x.strokeStyle = `rgba(95,88,78,${0.35 + Math.random() * 0.2})`; x.lineWidth = 9 + Math.random() * 9;
    const bx = s * 46 + 20; for (let yy = 0; yy <= 512; yy += 16) { const xx = bx + Math.sin(yy * 0.018 + s) * 16; yy === 0 ? x.moveTo(xx, yy) : x.lineTo(xx, yy); } x.stroke(); }
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace; tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
}
function makeTileTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 128; const x = c.getContext('2d');
  x.strokeStyle = 'rgba(255,255,255,0.5)'; x.lineWidth = 3; x.strokeRect(2, 2, 124, 124);
  return new THREE.CanvasTexture(c);
}
function makeMeow() {
  const c = document.createElement('canvas'); c.width = 256; c.height = 160; const x = c.getContext('2d');
  x.fillStyle = '#fff'; roundRect(x, 16, 14, 224, 96, 26); x.fill();
  x.beginPath(); x.moveTo(60, 104); x.lineTo(44, 150); x.lineTo(96, 104); x.closePath(); x.fill();
  x.fillStyle = '#2a2440'; x.font = 'bold 56px Sarabun, sans-serif'; x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillText('เหมียว~', 128, 60);
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true })); sp.scale.set(1.6, 1.0, 1); return sp;
}
function makeHeart() {
  const c = document.createElement('canvas'); c.width = c.height = 64; const x = c.getContext('2d');
  x.fillStyle = '#ff7aa2'; x.beginPath();
  x.moveTo(32, 56); x.bezierCurveTo(2, 34, 8, 8, 32, 22); x.bezierCurveTo(56, 8, 62, 34, 32, 56); x.fill();
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true })); sp.scale.set(0.5, 0.5, 1); return sp;
}
function roundRect(x, X, Y, w, h, r) {
  x.beginPath(); x.moveTo(X + r, Y); x.arcTo(X + w, Y, X + w, Y + h, r); x.arcTo(X + w, Y + h, X, Y + h, r);
  x.arcTo(X, Y + h, X, Y, r); x.arcTo(X, Y, X + w, Y, r); x.closePath();
}
